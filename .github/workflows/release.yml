name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build & bundle
        run: bash scripts/bundle.sh

      - name: Zip .app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --keepParent dist/Oolong.app "dist/Oolong-${VERSION}.zip"
          shasum -a 256 "dist/Oolong-${VERSION}.zip" | tee "dist/Oolong-${VERSION}.zip.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Oolong-*.zip
            dist/Oolong-*.zip.sha256
          generate_release_notes: true
